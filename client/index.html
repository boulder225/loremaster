<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>loremaster — PoC</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 1.2rem; padding: 2rem 1rem;
    background: #14110d; color: #e8e2d4;
    font: 16px/1.5 Georgia, "Times New Roman", serif;
  }
  h1 { font-size: 1.5rem; margin: 0; color: #d9a441; font-weight: normal; }
  .sub { margin: 0; opacity: 0.6; font-size: 0.85rem; }

  /* --- Reactive orb. Driven by CSS vars the Orb writes on <html>:
     --level (0..1 overall energy) and --bar0..--bar4 (5 frequency bands).
     The accent hue shifts by state class on the orb. --- */
  :root { --level: 0; --bar0:0; --bar1:0; --bar2:0; --bar3:0; --bar4:0; }
  #orb {
    position: relative; width: 220px; height: 220px;
    display: grid; place-items: center;
  }
  #talk {
    width: 180px; height: 180px; border-radius: 50%;
    border: 2px solid var(--accent, #d9a441);
    background:
      radial-gradient(circle at 50% 35%,
        color-mix(in srgb, var(--accent, #d9a441) calc(var(--level) * 45%), #3a2f1e),
        #1c170f);
    color: #e8e2d4; font: inherit; font-size: 1.05rem; cursor: pointer;
    /* pulse + glow scale with live audio level */
    transform: scale(calc(1 + var(--level) * 0.12));
    box-shadow: 0 0 calc(12px + var(--level) * 60px)
                calc(var(--level) * 10px)
                color-mix(in srgb, var(--accent, #d9a441) 60%, transparent);
    transition: border-color 0.2s, background 0.1s;
  }
  #talk:active { filter: brightness(1.1); }
  #talk:disabled { cursor: not-allowed; opacity: 0.5; }
  #talk.listening { --accent: #f0c76a; }
  #talk.thinking  { --accent: #b9863a; cursor: wait; }
  #talk.speaking  { --accent: #8fbf8f; }
  /* Five bars fanned across the orb, heights from --bar0..--bar4 */
  #bars {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; gap: 7px; pointer-events: none;
  }
  #bars > i {
    width: 8px; border-radius: 4px; background: var(--accent, #d9a441);
    opacity: 0.85;
    height: calc(14px + var(--h) * 120px);
    transition: height 0.05s linear;
  }
  #bars > i:nth-child(1) { --h: var(--bar0); }
  #bars > i:nth-child(2) { --h: var(--bar1); }
  #bars > i:nth-child(3) { --h: var(--bar2); }
  #bars > i:nth-child(4) { --h: var(--bar3); }
  #bars > i:nth-child(5) { --h: var(--bar4); }
  #status { min-height: 1.4rem; opacity: 0.7; font-size: 0.9rem; }
  #log {
    width: min(640px, 100%); display: flex; flex-direction: column; gap: 0.6rem;
  }
  .turn { padding: 0.5rem 0.8rem; border-radius: 8px; }
  .turn.you { background: #221c12; }
  .turn.npc { background: #1b2418; }
  .who { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.5; }
  #unsupported { color: #e08b6a; max-width: 640px; text-align: center; }
</style>
</head>
<body>
  <h1>The Salted Lantern</h1>
  <p class="sub">Hold the orb, speak to Bram, release. Works in any modern browser.</p>
  <div id="orb">
    <div id="bars"><i></i><i></i><i></i><i></i><i></i></div>
    <button id="talk">Hold&nbsp;to&nbsp;talk</button>
  </div>
  <div id="status"></div>
  <div id="log"></div>
  <p id="unsupported" hidden></p>

<script type="module">
import { Orb, ORB_FFT_SIZE } from "./orb.js";

const talk = document.getElementById("talk");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const unsupported = document.getElementById("unsupported");

// The reactive orb — fed the mic analyser while you speak, Bram's output
// analyser while he speaks. It idles (falls to rest) when pointed at null.
const orb = new Orb();
orb.start();

// STT is server-side (Amazon Transcribe): we capture mic audio with an
// AudioWorklet and stream 16 kHz PCM16 frames over a WebSocket. That works in
// every browser with getUserMedia + AudioWorklet — no SpeechRecognition needed.
const micSupported = Boolean(navigator.mediaDevices?.getUserMedia && window.AudioContext);
if (!micSupported) {
  unsupported.hidden = false;
  unsupported.textContent =
    "This browser can't capture microphone audio (getUserMedia / AudioWorklet). " +
    "Try a recent Chrome, Edge, or Firefox.";
  talk.disabled = true;
}

// Conversation history sent to the server each turn (the API is stateless).
const history = [];

// Server-side Polly TTS if available; else browser speechSynthesis.
let serverTts = false;
fetch("/config").then((r) => r.json()).then((c) => { serverTts = !!c.serverTts; }).catch(() => {});

// --- Speech playback: a small queue so clauses play in order, with barge-in ---
// `speechGen` is bumped on every barge-in; in-flight fetches/playbacks check it
// and abort, so a new turn (or the player talking over Bram) cuts old audio.
// Polly clauses play through a WebAudio graph so the orb reacts to Bram's voice.
let speechGen = 0;
let audioChain = Promise.resolve();
let currentAudio = null;
let playCtx = null, outAnalyser = null;

function ensurePlayGraph() {
  if (playCtx) return;
  playCtx = new AudioContext();
  outAnalyser = playCtx.createAnalyser();
  outAnalyser.fftSize = ORB_FFT_SIZE;
  outAnalyser.connect(playCtx.destination); // analyser -> speakers
}

function stopSpeaking() {
  speechGen++;
  window.speechSynthesis.cancel();
  if (currentAudio) { try { currentAudio.pause(); } catch {} currentAudio = null; }
  audioChain = Promise.resolve();
  talk.classList.remove("speaking");
  if (!listening) orb.setSource(null); // don't clobber the mic if we're listening
}

// Speak one clause. Uses Polly (mp3 over /tts) when available, else the browser.
function speak(text) {
  const clean = text.trim();
  if (!clean) return;
  const gen = speechGen;
  if (!serverTts) {
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.0; u.pitch = 0.9;
    u.onstart = () => { if (gen === speechGen) talk.classList.add("speaking"); };
    u.onend = () => { if (!window.speechSynthesis.speaking) talk.classList.remove("speaking"); };
    if (gen === speechGen) window.speechSynthesis.speak(u);
    return;
  }
  // Chain Polly clauses so they play strictly in order.
  audioChain = audioChain.then(async () => {
    if (gen !== speechGen) return; // barged in — skip
    const resp = await fetch("/tts", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ text: clean }),
    });
    if (!resp.ok || gen !== speechGen) return;
    const url = URL.createObjectURL(await resp.blob());
    await new Promise((resolve) => {
      if (gen !== speechGen) { URL.revokeObjectURL(url); return resolve(); }
      ensurePlayGraph();
      if (playCtx.state === "suspended") playCtx.resume().catch(() => {});
      const audio = new Audio(url);
      audio.crossOrigin = "anonymous";
      currentAudio = audio;
      // Route this clause through the analyser so the orb reacts to it.
      let node = null;
      try {
        node = playCtx.createMediaElementSource(audio);
        node.connect(outAnalyser);
        orb.setSource(outAnalyser);
      } catch { /* if routing fails, audio still plays via the element */ }
      talk.classList.add("speaking");
      const done = () => {
        URL.revokeObjectURL(url);
        try { node?.disconnect(); } catch {}
        if (currentAudio === audio) currentAudio = null;
        if (!currentAudio) { talk.classList.remove("speaking"); if (!listening) orb.setSource(null); }
        resolve();
      };
      audio.onended = done;
      audio.onerror = done;
      audio.play().catch(done);
    });
  }).catch(() => {});
}

const setStatus = (t) => { statusEl.textContent = t; };
function addTurn(who, text) {
  const div = document.createElement("div");
  div.className = `turn ${who === "You" ? "you" : "npc"}`;
  div.innerHTML = `<div class="who">${who}</div><div class="body"></div>`;
  div.querySelector(".body").textContent = text;
  logEl.appendChild(div);
  div.scrollIntoView({ block: "end" });
  return div.querySelector(".body");
}

// --- Push-to-talk: mic -> worklet -> WebSocket -> Amazon Transcribe ---
// Reuses the vendored mic-capture worklet (16 kHz PCM16 frames). The final
// transcript from Transcribe drives a normal sendTurn().
let audioCtx = null, micStream = null, captureNode = null, micSrc = null, micAnalyser = null;
let ws = null, finalText = "", listening = false;

talk.addEventListener("pointerdown", startListening);
talk.addEventListener("pointerup", stopListening);
talk.addEventListener("pointerleave", stopListening);

async function startListening() {
  if (!micSupported || listening || talk.classList.contains("thinking")) return;
  listening = true;
  stopSpeaking(); // barge-in: cut off Bram if he's talking
  finalText = "";
  talk.classList.add("listening");
  talk.textContent = "Listening…";
  setStatus("listening…");
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
    });
    audioCtx = new AudioContext();
    await audioCtx.audioWorklet.addModule("worklets/mic-capture.js");
    captureNode = new AudioWorkletNode(audioCtx, "mic-capture", {
      numberOfInputs: 1, numberOfOutputs: 0, processorOptions: { chunkMs: 100 },
    });

    // Open the STT socket; forward each PCM16 chunk as a binary frame.
    ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/stt`);
    ws.binaryType = "arraybuffer";
    const ready = new Promise((res) => (ws.onopen = res));
    ws.onmessage = (e) => {
      const evt = JSON.parse(e.data);
      if (evt.type === "partial") setStatus(`“${(finalText + " " + evt.text).trim()}”`);
      else if (evt.type === "final") { finalText = (finalText + " " + evt.text).trim(); setStatus(`“${finalText}”`); }
      else if (evt.type === "error") setStatus(`stt error: ${evt.error}`);
    };
    await ready;

    captureNode.port.onmessage = (e) => {
      if (e.data instanceof ArrayBuffer && ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
    };
    micSrc = audioCtx.createMediaStreamSource(micStream);
    micSrc.connect(captureNode);

    // Tap the mic for the orb (parallel to the worklet — doesn't affect capture).
    micAnalyser = audioCtx.createAnalyser();
    micAnalyser.fftSize = ORB_FFT_SIZE;
    micSrc.connect(micAnalyser);
    orb.setSource(micAnalyser);
  } catch (err) {
    setStatus(`mic error: ${err.message ?? err}`);
    teardownMic();
    talk.classList.remove("listening");
    talk.textContent = "Hold to talk";
    listening = false;
  }
}

function teardownMic() {
  try { captureNode?.disconnect(); } catch {}
  try { micSrc?.disconnect(); } catch {}
  try { micAnalyser?.disconnect(); } catch {}
  try { micStream?.getTracks().forEach((t) => t.stop()); } catch {}
  try { audioCtx?.close(); } catch {}
  captureNode = micSrc = micStream = micAnalyser = audioCtx = null;
  orb.setSource(null); // idle until Bram's playback points it at the output
}

function stopListening() {
  if (!listening) return;
  listening = false;
  talk.classList.remove("listening");
  talk.textContent = "Hold to talk";
  // Tell Transcribe we're done; it flushes a final transcript, then we act on it.
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send("stop");
    const sock = ws;
    const act = () => {
      const said = finalText.trim();
      if (said) sendTurn(said);
      else setStatus("(didn't catch that)");
    };
    let acted = false;
    sock.onmessage = (e) => {
      const evt = JSON.parse(e.data);
      if (evt.type === "final") finalText = (finalText + " " + evt.text).trim();
      else if ((evt.type === "done" || evt.type === "error") && !acted) { acted = true; act(); sock.close(); }
    };
    // Safety net if the socket never says done.
    setTimeout(() => { if (!acted) { acted = true; act(); try { sock.close(); } catch {} } }, 4000);
  }
  ws = null;
  teardownMic();
}

// --- Talk to Claude, stream text into TTS clause-by-clause ---
async function sendTurn(userText) {
  addTurn("You", userText);
  history.push({ role: "user", content: userText });

  talk.classList.add("thinking");
  talk.textContent = "Bram thinks…";
  setStatus("");

  const npcBody = addTurn("Bram", "");
  let full = "";
  let pending = ""; // buffer until we have a full clause to speak

  // Flush whole sentences/clauses out of `pending` as they complete, into the
  // shared speak() (Polly or browser TTS, chosen by /config).
  const flushClauses = (finalFlush = false) => {
    const parts = pending.split(/(?<=[.!?,:;])\s+/);
    const keepLast = finalFlush ? 0 : 1;
    while (parts.length > keepLast) { speak(parts.shift()); }
    pending = parts.join(" ");
    if (finalFlush && pending.trim()) { speak(pending); pending = ""; }
  };

  try {
    const resp = await fetch("/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ history }),
    });
    if (!resp.ok || !resp.body) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `server ${resp.status}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    talk.textContent = "Bram speaks…";
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const line = buf.slice(0, sep).trim();
        buf = buf.slice(sep + 2);
        if (!line.startsWith("data:")) continue;
        const evt = JSON.parse(line.slice(5).trim());
        if (evt.type === "delta") {
          full += evt.text; pending += evt.text;
          npcBody.textContent = full;
          flushClauses(false);
        } else if (evt.type === "error") {
          throw new Error(evt.error);
        }
      }
    }
    flushClauses(true);
    history.push({ role: "assistant", content: full.trim() });
  } catch (err) {
    npcBody.textContent = `⚠ ${err.message}`;
    setStatus("");
  } finally {
    talk.classList.remove("thinking");
    talk.textContent = "Hold to talk";
  }
}
</script>
</body>
</html>
