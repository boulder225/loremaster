<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>loremaster — PoC</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 1.2rem; padding: 2rem 1rem;
    background: #14110d; color: #e8e2d4;
    font: 16px/1.5 Georgia, "Times New Roman", serif;
  }
  h1 { font-size: 1.5rem; margin: 0; color: #d9a441; font-weight: normal; }
  .sub { margin: 0; opacity: 0.6; font-size: 0.85rem; }
  #talk {
    width: 180px; height: 180px; border-radius: 50%; border: 2px solid #d9a441;
    background: radial-gradient(circle at 50% 35%, #3a2f1e, #1c170f);
    color: #e8e2d4; font: inherit; font-size: 1.1rem; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  #talk:active { transform: scale(0.97); }
  #talk.listening { box-shadow: 0 0 0 8px rgba(217,164,65,0.15); border-color: #f0c76a; }
  #talk.thinking { opacity: 0.6; cursor: wait; }
  #talk.speaking { box-shadow: 0 0 0 8px rgba(120,180,120,0.18); border-color: #8fbf8f; }
  #status { min-height: 1.4rem; opacity: 0.7; font-size: 0.9rem; }
  #log {
    width: min(640px, 100%); display: flex; flex-direction: column; gap: 0.6rem;
  }
  .turn { padding: 0.5rem 0.8rem; border-radius: 8px; }
  .turn.you { background: #221c12; }
  .turn.npc { background: #1b2418; }
  .who { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.5; }
  #unsupported { color: #e08b6a; max-width: 640px; text-align: center; }
</style>
</head>
<body>
  <h1>The Salted Lantern</h1>
  <p class="sub">Hold the button, speak to Bram, release. (Chrome/Edge recommended.)</p>
  <button id="talk">Hold&nbsp;to&nbsp;talk</button>
  <div id="status"></div>
  <div id="log"></div>
  <p id="unsupported" hidden></p>

<script type="module">
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const talk = document.getElementById("talk");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");

if (!SR || !window.speechSynthesis) {
  document.getElementById("unsupported").hidden = false;
  document.getElementById("unsupported").textContent =
    "This browser lacks the Web Speech API (SpeechRecognition / speechSynthesis). " +
    "Use Chrome or Edge for this PoC.";
  talk.disabled = true;
}

// Conversation history sent to the server each turn (the API is stateless).
const history = [];

const setStatus = (t) => { statusEl.textContent = t; };
function addTurn(who, text) {
  const div = document.createElement("div");
  div.className = `turn ${who === "You" ? "you" : "npc"}`;
  div.innerHTML = `<div class="who">${who}</div><div class="body"></div>`;
  div.querySelector(".body").textContent = text;
  logEl.appendChild(div);
  div.scrollIntoView({ block: "end" });
  return div.querySelector(".body");
}

// --- Speech recognition (push-to-talk) ---
let recognition = null;
let finalTranscript = "";

talk.addEventListener("pointerdown", startListening);
talk.addEventListener("pointerup", stopListening);
talk.addEventListener("pointerleave", stopListening);

function startListening() {
  if (!SR || talk.classList.contains("thinking")) return;
  window.speechSynthesis.cancel(); // barge-in: cut off Bram if he's talking
  finalTranscript = "";
  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) finalTranscript += r[0].transcript;
      else interim += r[0].transcript;
    }
    setStatus(`“${(finalTranscript + interim).trim()}”`);
  };
  recognition.onerror = (e) => setStatus(`mic error: ${e.error}`);
  recognition.start();
  talk.classList.add("listening");
  talk.textContent = "Listening…";
  setStatus("listening…");
}

function stopListening() {
  if (!recognition) return;
  recognition.stop();
  recognition = null;
  talk.classList.remove("listening");
  talk.textContent = "Hold to talk";
  const said = finalTranscript.trim();
  if (said) sendTurn(said);
  else setStatus("(didn't catch that)");
}

// --- Talk to Claude, stream text into TTS clause-by-clause ---
async function sendTurn(userText) {
  addTurn("You", userText);
  history.push({ role: "user", content: userText });

  talk.classList.add("thinking");
  talk.textContent = "Bram thinks…";
  setStatus("");

  const npcBody = addTurn("Bram", "");
  let full = "";
  let pending = ""; // buffer until we have a full clause to speak

  const speak = (text) => {
    const clean = text.trim();
    if (!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.0; u.pitch = 0.9;
    u.onstart = () => talk.classList.add("speaking");
    u.onend = () => { if (!window.speechSynthesis.speaking) talk.classList.remove("speaking"); };
    window.speechSynthesis.speak(u);
  };
  // Flush whole sentences/clauses out of `pending` as they complete.
  const flushClauses = (finalFlush = false) => {
    const parts = pending.split(/(?<=[.!?,:;])\s+/);
    const keepLast = finalFlush ? 0 : 1;
    while (parts.length > keepLast) { speak(parts.shift()); }
    pending = parts.join(" ");
    if (finalFlush && pending.trim()) { speak(pending); pending = ""; }
  };

  try {
    const resp = await fetch("/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ history }),
    });
    if (!resp.ok || !resp.body) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `server ${resp.status}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    talk.textContent = "Bram speaks…";
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const line = buf.slice(0, sep).trim();
        buf = buf.slice(sep + 2);
        if (!line.startsWith("data:")) continue;
        const evt = JSON.parse(line.slice(5).trim());
        if (evt.type === "delta") {
          full += evt.text; pending += evt.text;
          npcBody.textContent = full;
          flushClauses(false);
        } else if (evt.type === "error") {
          throw new Error(evt.error);
        }
      }
    }
    flushClauses(true);
    history.push({ role: "assistant", content: full.trim() });
  } catch (err) {
    npcBody.textContent = `⚠ ${err.message}`;
    setStatus("");
  } finally {
    talk.classList.remove("thinking");
    talk.textContent = "Hold to talk";
  }
}
</script>
</body>
</html>
